# MergeSlide — FEATHER backend configuration
feather:
  model_name: "abmil.base.conch_v15.pc108-24k"
  from_pretrained: true
  num_epochs: 10
  lr: 1.0e-5
  weight_decay: 1.0e-4
  save_dir: "./checkpoints/feather_finetuned"
  num_folds: 10
  num_workers: 0
  k: 400
  patch_size: 512
  magnification: 20
  freeze_backbone: false
  use_wandb: true
